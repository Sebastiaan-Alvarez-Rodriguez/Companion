apply plugin: 'com.android.application'

android {
    compileSdkVersion 29
    defaultConfig {
        applicationId "com.python.companion"
        minSdkVersion 29
        targetSdkVersion 29
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        //SchemaLocation is used by Room to export database schema to, as a json-formatted file
        javaCompileOptions {
            annotationProcessorOptions {
                arguments = ["room.schemaLocation": "$projectDir/schemas".toString()]
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility = 1.8
        targetCompatibility = 1.8
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    implementation 'androidx.appcompat:appcompat:1.1.0'
    implementation 'com.google.android.material:material:1.1.0'
    implementation 'androidx.constraintlayout:constraintlayout:1.1.3'
    implementation 'androidx.lifecycle:lifecycle-extensions:2.2.0'

    implementation 'androidx.navigation:navigation-fragment:2.2.1'
    implementation 'androidx.navigation:navigation-ui:2.2.1'

    implementation 'androidx.room:room-runtime:2.2.5'
    annotationProcessor 'androidx.room:room-compiler:2.2.5'

    implementation 'io.noties.markwon:core:4.4.0'
    implementation 'io.noties.markwon:linkify:4.4.0'
    implementation 'io.noties.markwon:ext-latex:4.4.0'


    implementation 'com.github.skydoves:colorpickerview:2.1.6'
    implementation 'com.mikepenz:fastadapter:5.0.0-a03'
    implementation 'com.mikepenz:fastadapter-extensions-utils:5.0.0-a03'
    implementation 'com.mikepenz:fastadapter-extensions-diff:5.0.0-a03'
//    implementation 'com.mikepenz:fastadapter-extensions-selections:5.0.0-a03'

    implementation 'org.signal:argon2:13.1@aar'
    implementation 'org.msgpack:msgpack-core:0.8.2'
}
